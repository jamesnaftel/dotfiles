# tmux conf file
#
set -g default-terminal "xterm-256color"

# Change status bar
set-window-option -g window-status-current-bg red
set -g status-bg blue
set -g status-fg white
set -g status-left '>>>>>  #[default]'

# Change pane borders
set-option -g pane-border-fg colour136 #yellow
set-option -g pane-active-border-fg colour136 #yellow

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize panes
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

#copy paste helper - not sure i like this but giving it a try
#setw -g mode-keys vi
#bind P paste-buffer
#bind-key -t vi-copy 'v' begin-selection
#bind-key -t vi-copy 'y' copy-selection
#bind-key -t vi-copy 'r' rectangle-toggle

# start numbering at 1 so i don't have to reach for 0
set -g base-index 1
setw -g pane-base-index 1

# helpers
bind-key r source ~/.tmux.conf
setw -g mouse on
set -g history-limit 10000


# tmux plugin
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
